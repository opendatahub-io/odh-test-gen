name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Run skillsaw
      uses: stbenjam/skillsaw@d252498eb6260e197c9c395a650643d9c49ae37b # v0
      with:
        strict: 'true'

